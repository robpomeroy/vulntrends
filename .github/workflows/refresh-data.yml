name: Refresh vulnerability data

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # Full history needed for git pull --rebase to work
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build data
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          # Optional — bumps MSRC CVRF API rate limit when set.
          # Leave the secret unset for slower (but still working) refreshes.
          MSRC_API_KEY: ${{ secrets.MSRC_API_KEY }}
        run: npm run data:build

      - name: Validate data
        run: npm run data:validate

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f src/data/
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore(data): refresh vulnerability data"
            git pull --rebase
            git push
          fi
