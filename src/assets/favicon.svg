<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="VulnTrends">
  <!--
    VulnTrends favicon — a shield silhouette (security / vulnerability)
    with a rising trend line cutting through it (trends over time).

    Uses the project's accent colour (sky-400, #38bdf8) on dark
    backgrounds and a darker slate on light backgrounds, matching
    the dashboard's dark-first palette (see src/styles/global.css).
    The single-colour design stays legible at 16x16 favicon size.
  -->
  <defs>
    <!--
      Clip the trend line to the shield shape so the line appears to
      pierce the shield rather than float above it.
    -->
    <clipPath id="shield-clip">
      <path d="M64 8 L112 24 V60 C112 88 92 108 64 120 C36 108 16 88 16 60 V24 Z" />
    </clipPath>
  </defs>

  <!-- Shield outline (the "vulnerability" metaphor) -->
  <path
    d="M64 8 L112 24 V60 C112 88 92 108 64 120 C36 108 16 88 16 60 V24 Z"
    fill="none"
    stroke="currentColor"
    stroke-width="6"
    stroke-linejoin="round"
  />

  <!--
    Rising trend line (the "trends" metaphor), clipped to the shield.
    A zig-zag of up- and down-ticks with an overall upward trend —
    reads as a graph line rather than a straight diagonal. Drawn as a
    thick polyline with rounded joins so it reads at small sizes. The
    clip makes the line appear to enter and exit the shield.

    The line's average y (~65) is centred on the shield's vertical
    midline (y=64), so the area under the line roughly equals the
    area above it within the shield.
  -->
  <g clip-path="url(#shield-clip)">
    <polyline
      points="8,80 28,88 44,68 60,76 76,52 92,60 120,28"
      fill="none"
      stroke="currentColor"
      stroke-width="8"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.9"
    />
    <!-- Trend endpoint marker — a small filled circle at the peak -->
    <circle cx="120" cy="28" r="7" fill="currentColor" />
  </g>

  <style>
    /* Default (dark backgrounds): sky-400, the project accent. */
    svg { color: #38bdf8; }
    @media (prefers-color-scheme: light) {
      /* Light backgrounds: a darker sky so it stays visible. */
      svg { color: #0284c7; } /* sky-600 */
    }
  </style>
</svg>
